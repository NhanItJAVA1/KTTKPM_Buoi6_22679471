version: "3.8"

networks:
  movie-network:
    driver: bridge

volumes:
  postgres-user-data:
  postgres-movie-data:
  postgres-booking-data:
  postgres-payment-data:

services:
  # ─────────────────────────────────────────────────────────────────
  # KAFKA INFRASTRUCTURE
  # ─────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - movie-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - movie-network
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # DATABASES
  # ─────────────────────────────────────────────────────────────────
  postgres-user:
    image: postgres:15-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: ${POSTGRES_USER_DB:-user_db}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - movie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-movie:
    image: postgres:15-alpine
    container_name: postgres-movie
    environment:
      POSTGRES_DB: ${POSTGRES_MOVIE_DB:-movie_db}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5433:5432"
    volumes:
      - postgres-movie-data:/var/lib/postgresql/data
    networks:
      - movie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-booking:
    image: postgres:15-alpine
    container_name: postgres-booking
    environment:
      POSTGRES_DB: ${POSTGRES_BOOKING_DB:-booking_db}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5434:5432"
    volumes:
      - postgres-booking-data:/var/lib/postgresql/data
    networks:
      - movie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:15-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_DB: ${POSTGRES_PAYMENT_DB:-payment_db}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5435:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    networks:
      - movie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # SERVICES
  # ─────────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      DB_HOST: postgres-user
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_USER_DB:-user_db}
      DB_USER: postgres
      DB_PASS: ${POSTGRES_PASSWORD:-postgres123}
      KAFKA_BROKER: kafka:9092
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID_USER:-user-service-group}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_2024}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
    depends_on:
      kafka:
        condition: service_healthy
      postgres-user:
        condition: service_healthy
    networks:
      - movie-network
    restart: unless-stopped

  movie-service:
    build:
      context: ./services/movie-service
      dockerfile: Dockerfile
    container_name: movie-service
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      DB_HOST: postgres-movie
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_MOVIE_DB:-movie_db}
      DB_USER: postgres
      DB_PASS: ${POSTGRES_PASSWORD:-postgres123}
    depends_on:
      postgres-movie:
        condition: service_healthy
    networks:
      - movie-network
    restart: unless-stopped

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      DB_HOST: postgres-booking
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_BOOKING_DB:-booking_db}
      DB_USER: postgres
      DB_PASS: ${POSTGRES_PASSWORD:-postgres123}
      KAFKA_BROKER: kafka:9092
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID_BOOKING:-booking-service-group}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_2024}
    depends_on:
      kafka:
        condition: service_healthy
      postgres-booking:
        condition: service_healthy
    networks:
      - movie-network
    restart: unless-stopped

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      DB_HOST: postgres-payment
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_PAYMENT_DB:-payment_db}
      DB_USER: postgres
      DB_PASS: ${POSTGRES_PASSWORD:-postgres123}
      KAFKA_BROKER: kafka:9092
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID_PAYMENT:-payment-service-group}
    depends_on:
      kafka:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
    networks:
      - movie-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      PORT: 8086
      KAFKA_BROKER: kafka:9092
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID_NOTIFICATION:-notification-service-group}
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - movie-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_USER_SERVICE_URL: http://localhost:8081
        VITE_MOVIE_SERVICE_URL: http://localhost:8082
        VITE_BOOKING_SERVICE_URL: http://localhost:8083
    container_name: frontend
    ports:
      - "8085:8085"
    depends_on:
      - user-service
      - movie-service
      - booking-service
    networks:
      - movie-network
    restart: unless-stopped
